<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 태그·속성 추출기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Pretendard', sans-serif; background: #f7f8fa; min-height: 100vh; padding: 2rem 1rem; color: #111; }
.container { max-width: 700px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }
.server-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: #f8f8f8; color: #888; margin-top: 8px; }
.server-status.ok { border-color: #c5e8d5; background: #f0faf5; color: #018d4c; }
.server-status.err { border-color: #fcc; background: #fff5f5; color: #c0392b; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
.tab { padding: 7px 16px; border-radius: 8px; border: 1px solid #ddd; background: #f8f8f8; font-size: 13px; cursor: pointer; color: #666; }
.tab.active { background: #03c75a; color: #fff; border-color: #03c75a; }
.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.input-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
.input-row input:focus { border-color: #03c75a; }
.input-row input.required { border-color: #03c75a; }
.btn-green { padding: 10px 20px; background: #03c75a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-green:disabled { background: #bbb; cursor: not-allowed; }
.btn-gray { padding: 10px 16px; background: #f0f0f0; color: #555; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.card { background: #fff; border-radius: 14px; border: 1px solid #ebebeb; padding: 1.25rem; margin-bottom: 12px; }
.card-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; }
.copy-btn { margin-left: auto; font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 1px solid #ddd; background: #f8f8f8; color: #666; cursor: pointer; }
.prod-name { font-size: 15px; font-weight: 700; }
.tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #f0faf5; color: #018d4c; border: 1px solid #c5e8d5; font-weight: 500; }
.attr-row { display: flex; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f2f2f2; }
.attr-row:last-child { border-bottom: none; }
.attr-key { color: #999; width: 120px; flex-shrink: 0; }
.attr-val { font-weight: 600; }
.completed { font-size: 14px; font-weight: 600; line-height: 1.5; word-break: break-all; }
.badge-1 { color: #018d4c; }
.badge-2 { color: #1a73e8; }
.badge-3 { color: #9c27b0; }
.file-area { border: 2px dashed #ddd; border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 10px; }
.file-area:hover { border-color: #03c75a; background: #f0faf5; }
.file-area input { display: none; }
.file-area p { font-size: 13px; color: #888; }
textarea { width: 100%; height: 100px; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 13px; resize: vertical; outline: none; font-family: inherit; }
textarea:focus { border-color: #03c75a; }
.hint { font-size: 11px; color: #aaa; margin: 4px 0 10px; }
.btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
.progress-wrap { margin-bottom: 12px; display: none; }
.progress-bar { height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #03c75a; transition: width 0.3s; width: 0%; }
.progress-text { font-size: 12px; color: #888; margin-top: 4px; }
.result-list { max-height: 400px; overflow-y: auto; }
.result-item { background: #fff; border: 1px solid #ebebeb; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.ri-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.ri-comp { font-size: 12px; font-weight: 600; margin-top: 4px; }
.ri-err { font-size: 11px; color: #c0392b; margin-top: 4px; }
.sbadge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 3px; margin-left: 6px; }
.b-ok { background: #f0faf5; color: #018d4c; }
.b-err { background: #fff0f0; color: #c0392b; }
.b-nf { background: #fff8f0; color: #c67c00; }
.b-mis { background: #f0f0ff; color: #5050cc; }
.b-na { background: #f5f5f5; color: #888; }
.error-box { background: #fff5f5; border: 1px solid #fcc; border-radius: 10px; padding: 12px; font-size: 13px; color: #c0392b; margin-bottom: 12px; }
.loading { text-align: center; padding: 1.5rem; font-size: 13px; color: #aaa; }
.empty { font-size: 13px; color: #bbb; text-align: center; padding: 20px; }
.required-kw { background: #fff; border: 1.5px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 13px; width: 100%; margin-bottom: 8px; outline: none; }
.required-kw:focus { border-color: #ff9800; }
.kw-label { font-size: 11px; color: #ff9800; font-weight: 700; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>상품 태그·속성 추출기</h1>
    <p>네이버 쇼핑 상품의 태그와 속성을 자동으로 추출합니다</p>
    <div class="server-status" id="serverStatus">
      <div class="dot"></div><span>서버 확인 중...</span>
    </div>
    <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
      <input type="password" id="apiKeyInput" placeholder="Anthropic API 키 (sk-ant-...)" style="flex:1; padding:8px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:12px; outline:none;" />
      <button onclick="saveApiKey()" style="padding:8px 14px; background:#111; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer;">저장</button>
      <span id="apiKeySaved" style="font-size:11px; color:#018d4c; display:none;">✓ 저장됨</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabSingle" onclick="switchTab('single')">단일</button>
    <button class="tab" id="tabBulk" onclick="switchTab('bulk')">대량</button>
  </div>

  <!-- 단일 -->
  <div id="singleTab">
    <div class="input-row">
      <input type="text" id="queryInput" placeholder="상품명" />
    </div>
    <div class="input-row">
      <input type="text" id="nvmidInput" placeholder="nvmid (선택)" />
      <button class="btn-green" id="searchBtn" onclick="searchSingle()">검색</button>
    </div>
    <div class="kw-label">⚡ 필수키워드 (상품명·속성·태그에서 제거할 단어, 스페이스로 구분)</div>
    <input type="text" class="required-kw" id="requiredKw" placeholder="예: 보조배터리 급속충전 (빈칸이면 제거 안 함)" />
    <div id="errorBox" class="error-box" style="display:none;"></div>
    <div id="singleLoading" class="loading" style="display:none;">검색 중...</div>
    <div id="singleResult"></div>
  </div>

  <!-- 대량 -->
  <div id="bulkTab" style="display:none;">
    <div class="kw-label">⚡ 필수키워드 (상품명·속성·태그에서 제거할 단어, 스페이스로 구분)</div>
    <input type="text" class="required-kw" id="bulkRequiredKw" placeholder="예: 보조배터리 급속충전 (빈칸이면 제거 안 함)" />
    <label class="file-area" id="fileArea">
      <input type="file" id="csvFile" accept=".csv,.txt" onchange="handleFile(event)" />
      <p>📂 CSV 파일 업로드 (A열: 상품명, B열: nvmid)</p>
      <p style="font-size:11px;margin-top:4px;">엑셀 → 다른이름저장 → CSV</p>
    </label>
    <textarea id="bulkInput" placeholder="또는 직접 입력: 상품명|nvmid (한 줄에 하나씩)"></textarea>
    <div class="hint">* 줄바꿈으로 구분 / nvmid 없으면 상품명만 입력</div>
    <div class="btn-row">
      <button class="btn-green" id="bulkStartBtn" onclick="startBulk()">시작</button>
      <button class="btn-gray" id="bulkStopBtn" style="display:none;" onclick="stopBulk()">중지</button>
      <button class="btn-gray" id="exportBtn" style="display:none;" onclick="exportCSV()">CSV 저장</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
    <div id="bulkResult" class="result-list"></div>
  </div>
</div>

<script>
const API = 'https://undeposable-inarguably-renna.ngrok-free.dev';
let bulkResults = [];
let stopFlag = false;
let morphemeCache = {}; // 형태소 분해 캐시

// API 키 저장/불러오기
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('anthropic_api_key', key);
  const saved = document.getElementById('apiKeySaved');
  saved.style.display = 'inline';
  setTimeout(() => saved.style.display = 'none', 2000);
}

function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

// 페이지 로드 시 API 키 복원
window.addEventListener('DOMContentLoaded', () => {
  const key = getApiKey();
  if (key) document.getElementById('apiKeyInput').value = key;
});

// AI로 필수키워드 형태소 분해
async function getMorphemes(keywords) {
  if (!keywords.length) return [];
  const cacheKey = keywords.join(',');
  if (morphemeCache[cacheKey]) return morphemeCache[cacheKey];

  const apiKey = getApiKey();
  if (!apiKey) return keywords; // API 키 없으면 원본 그대로

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 150,
        messages: [{
          role: 'user',
          content: `다음 키워드들을 의미있는 형태소 단위로 분해해주세요. 결과는 JSON 배열로만 출력하세요.
예시: "작두콩차" → ["작두콩", "콩차", "작두", "차"]
예시: "보조배터리" → ["보조배터리", "배터리", "보조"]
키워드: ${keywords.join(', ')}
JSON 배열만 출력 (설명 없이):`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const morphemes = JSON.parse(clean);
    morphemeCache[cacheKey] = morphemes;
    return morphemes;
  } catch {
    return keywords;
  }
}

async function checkServer() {
  const el = document.getElementById('serverStatus');
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);
    const res = await fetch(API + '/health', { signal: ctrl.signal, headers: { 'ngrok-skip-browser-warning': 'true' } });
    clearTimeout(timer);
    const data = await res.json();
    if (data.status === 'ok') {
      el.className = 'server-status ok';
      el.innerHTML = '<div class="dot"></div><span>서버 연결됨</span>';
      return true;
    }
  } catch {}
  el.className = 'server-status err';
  el.innerHTML = '<div class="dot"></div><span>서버 오프라인 — 서버실행.bat 실행해주세요</span>';
  return false;
}
checkServer();
setInterval(checkServer, 10000);

function switchTab(tab) {
  document.getElementById('singleTab').style.display = tab === 'single' ? 'block' : 'none';
  document.getElementById('bulkTab').style.display = tab === 'bulk' ? 'block' : 'none';
  document.getElementById('tabSingle').classList.toggle('active', tab === 'single');
  document.getElementById('tabBulk').classList.toggle('active', tab === 'bulk');
}

// 필수키워드의 2글자 이상 부분 문자열 생성
function getKwSubstrings(kws) {
  const subs = new Set();
  kws.forEach(kw => {
    const k = kw.replace(/[^\uAC00-\uD7A3a-z0-9]/g, '');
    for (let i = 0; i < k.length; i++) {
      for (let j = i + 2; j <= k.length; j++) {
        subs.add(k.slice(i, j));
      }
    }
  });
  return [...subs].sort((a, b) => b.length - a.length); // 긴 것부터
}

// 단어에서 필수키워드 부분 제거 후 나머지 반환
function removeKwFromWord(word, kwSubs) {
  let w = word.replace(/[^\uAC00-\uD7A3a-z0-9.]/g, '');
  for (const sub of kwSubs) {
    if (w.includes(sub)) {
      w = w.split(sub).join('');
    }
  }
  return w.trim();
}

function parseRequiredKw(kwStr) {
  return kwStr.trim().split(/\s+/).filter(w => w.length >= 2);
}

// 겹침 체크 - 상품명 + 필수키워드 기준
function makeBaseWords(productName, requiredKws) {
  const allText = [productName, ...requiredKws].join(' ');
  return allText.toLowerCase().replace(/[^\uAC00-\uD7A3a-z0-9.\s]/g, '').split(/\s+/).filter(w => w.length >= 2);
}

function isOverlap(word, baseWords) {
  const wl = word.toLowerCase().replace(/[^\uAC00-\uD7A3a-z0-9.]/g, '');
  if (wl.length < 2) return true;
  const numOnly = wl.replace(/[^0-9]/g, '');
  if (numOnly.length > 0 && baseWords.some(nw => nw.replace(/[^0-9]/g, '') === numOnly)) return true;
  return baseWords.some(nw => nw.includes(wl) || wl.includes(nw));
}

function extractNewWords(values, baseWords, morphemes) {
  const result = [];
  values.forEach(val => {
    val.split(/[,\/\s]+/).map(v => v.trim()).filter(v => v.length >= 2).forEach(v => {
      const vClean = v.replace(/[^\uAC00-\uD7A3a-zA-Z0-9.]/g,'');
      if (vClean.length < 2) return;

      // 형태소 단위로 제거 후 나머지 추출
      let remaining = vClean;
      for (const m of morphemes) {
        const mClean = m.replace(/[^\uAC00-\uD7A3a-zA-Z0-9]/g,'');
        if (mClean.length >= 2 && remaining.includes(mClean)) {
          remaining = remaining.split(mClean).join('');
        }
      }
      remaining = remaining.trim();

      // 나머지 2글자 미만이면 버림
      if (remaining.length < 2) return;
      // 상품명+필수키워드와 겹치면 버림
      if (isOverlap(remaining, baseWords)) return;
      if (!result.includes(remaining)) result.push(remaining);
    });
  });
  return result;
}

async function makeCompleted(productName, attributes, tags, requiredKws) {
  const baseWords = makeBaseWords(productName, requiredKws);

  // 상품명에서 필수키워드와 겹치는 단어 제거
  let cleanName = productName;
  // 괄호 제거 (내용은 유지)
  cleanName = cleanName.replace(/\(([^)]+)\)/g, ' $1').replace(/\s+/g, ' ').trim();
  if (requiredKws.length > 0) {
    const nameTokens = cleanName.split(/\s+/);
    const filteredTokens = nameTokens.filter(token => {
      const t = token.toLowerCase().replace(/[^\uAC00-\uD7A3a-z0-9.]/g, '');
      if (t.length < 2) return true;
      return !requiredKws.some(kw => {
        const k = kw.toLowerCase().replace(/[^\uAC00-\uD7A3a-z0-9.]/g, '');
        return t.includes(k) || k.includes(t);
      });
    });
    cleanName = filteredTokens.join(' ').replace(/\s+/g, ' ').trim();
  }

  // AI로 형태소 분해
  const morphemes = await getMorphemes(requiredKws);

  const cleanNameWords = cleanName.toLowerCase().replace(/[^\uAC00-\uD7A3a-z0-9.\s]/g, '').split(/\s+/).filter(w => w.length >= 2);
  const allBaseWords = [...baseWords, ...cleanNameWords];

  const attrWords = extractNewWords(Object.values(attributes), allBaseWords, morphemes);
  const tagWords = extractNewWords(tags, [...allBaseWords, ...attrWords], morphemes);

  const c1 = [cleanName, ...attrWords].join(' ').trim();
  const c2 = [cleanName, ...tagWords].join(' ').trim();
  const c3 = [cleanName, ...attrWords, ...tagWords].join(' ').trim();
  return { c1, c2, c3 };
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

async function searchSingle() {
  const query = document.getElementById('queryInput').value.trim();
  const nvmid = document.getElementById('nvmidInput').value.trim();
  const kwStr = document.getElementById('requiredKw').value;
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '검색 중...';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('singleLoading').style.display = 'block';
  document.getElementById('singleResult').innerHTML = '';

  const requiredKws = parseRequiredKw(kwStr);

  try {
    const params = new URLSearchParams({ query });
    if (nvmid) params.append('nvmid', nvmid);
    requiredKws.forEach(k => params.append('kw', k));
    const apiKey = getApiKey();
    if (apiKey) params.append('apiKey', apiKey);

    const res = await fetch(`${API}/search?${params}`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
    const d = await res.json();
    renderSingle(d);
  } catch (e) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = '서버 연결 실패 — 서버실행.bat을 실행해주세요';
  } finally {
    btn.disabled = false; btn.textContent = '검색';
    document.getElementById('singleLoading').style.display = 'none';
  }
}

function renderSingle(d) {
  const r = document.getElementById('singleResult');
  if (d.status === 'notFound') { r.innerHTML = '<div class="empty">상품을 찾을 수 없습니다</div>'; return; }
  if (d.status === 'nvmidMismatch') { r.innerHTML = `<div class="empty" style="color:#5050cc">nvmid 불일치<br><small style="color:#aaa">${d.error||''}</small></div>`; return; }
  if (d.status === 'noAttributes') { r.innerHTML = `<div class="card"><div class="prod-name">${d.productName||'-'}</div><div style="font-size:12px;color:#888;margin-top:6px;">✓ nvmid 일치 — 속성 없는 상품</div></div>`; return; }
  if (d.status === 'error') { r.innerHTML = `<div class="empty">오류: ${d.error}</div>`; return; }

  const c1 = d.c1 || '', c2 = d.c2 || '', c3 = d.c3 || '';

  let html = `<div class="card"><div class="prod-name">${d.productName||'-'}</div></div>`;

  if (Object.keys(d.attributes||{}).length) {
    html += `<div class="card"><div class="card-label">속성</div>
      ${Object.entries(d.attributes).map(([k,v])=>`<div class="attr-row"><span class="attr-key">${k}</span><span class="attr-val">${v}</span></div>`).join('')}
    </div>`;
  }

  if (d.tags?.length) {
    const tagStr = d.tags.join(' ');
    html += `<div class="card">
      <div class="card-label">태그 <button class="copy-btn" onclick="copyText('${tagStr}',this)">복사</button></div>
      <div class="tag-wrap">${d.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    </div>`;
  }

  html += `
    <div class="card">
      <div class="card-label badge-1">완성 상품명 1차 (속성) <button class="copy-btn" onclick="copyText(this.closest('.card').querySelector('.completed').textContent,this)">복사</button></div>
      <div class="completed">${c1}</div>
    </div>
    <div class="card">
      <div class="card-label badge-2">완성 상품명 2차 (태그) <button class="copy-btn" onclick="copyText(this.closest('.card').querySelector('.completed').textContent,this)">복사</button></div>
      <div class="completed">${c2}</div>
    </div>
    <div class="card">
      <div class="card-label badge-3">완성 상품명 3차 (속성+태그) <button class="copy-btn" onclick="copyText(this.closest('.card').querySelector('.completed').textContent,this)">복사</button></div>
      <div class="completed">${c3}</div>
    </div>`;

  r.innerHTML = html;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const lines = ev.target.result.split(/\r?\n/).filter(Boolean);
    const rows = lines.map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim())).filter(cols=>cols[0]&&cols[0]!=='상품명');
    document.getElementById('bulkInput').value = rows.map(cols=>cols[1]?`${cols[0]}|${cols[1]}`:cols[0]).join('\n');
  };
  reader.readAsText(file, 'UTF-8');
}

let bulkTotal = 0;
async function startBulk() {
  const raw = document.getElementById('bulkInput').value.trim();
  if (!raw) return;
  const kwStr = document.getElementById('bulkRequiredKw').value;
  const requiredKws = parseRequiredKw(kwStr);
  const lines = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const items = lines.map(line => {
    const parts = line.split('|');
    return parts.length >= 2 ? { query: parts[0].trim(), nvmid: parts[1].trim() } : { query: line, nvmid: '' };
  });

  bulkResults = [];
  stopFlag = false;
  bulkTotal = items.length;
  document.getElementById('bulkResult').innerHTML = '';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('bulkStartBtn').style.display = 'none';
  document.getElementById('bulkStopBtn').style.display = 'inline-block';
  document.getElementById('exportBtn').style.display = 'none';
  setProgress(0, items.length);

  for (let i = 0; i < items.length; i++) {
    if (stopFlag) break;
    const item = items[i];
    try {
      const params = new URLSearchParams({ query: item.query });
      if (item.nvmid) params.append('nvmid', item.nvmid);
      requiredKws.forEach(k => params.append('kw', k));
      const apiKey = getApiKey();
      if (apiKey) params.append('apiKey', apiKey);
      const res = await fetch(`${API}/search?${params}`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
      const d = await res.json();
      bulkResults.push({ query: item.query, nvmid: item.nvmid, ...d });
    } catch {
      bulkResults.push({ query: item.query, nvmid: item.nvmid, status: 'error', error: '서버 연결 실패' });
    }
    setProgress(i + 1, items.length);
    renderBulk();
    if (i < items.length - 1) await new Promise(r => setTimeout(r, 1200));
  }

  document.getElementById('bulkStartBtn').style.display = 'inline-block';
  document.getElementById('bulkStopBtn').style.display = 'none';
  if (bulkResults.length) document.getElementById('exportBtn').style.display = 'inline-block';
}

function stopBulk() {
  stopFlag = true;
  document.getElementById('bulkStartBtn').style.display = 'inline-block';
  document.getElementById('bulkStopBtn').style.display = 'none';
  if (bulkResults.length) document.getElementById('exportBtn').style.display = 'inline-block';
}

function setProgress(done, total) {
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 완료`;
}

function renderBulk() {
  document.getElementById('bulkResult').innerHTML = bulkResults.map(d => {
    const badge = d.status === 'success' ? '<span class="sbadge b-ok">완료</span>'
      : d.status === 'noAttributes' ? '<span class="sbadge b-na">속성없음</span>'
      : d.status === 'nvmidMismatch' ? '<span class="sbadge b-mis">nvmid불일치</span>'
      : d.status === 'notFound' ? '<span class="sbadge b-nf">미발견</span>'
      : '<span class="sbadge b-err">오류</span>';
    const failReason = d.status !== 'success' ? `<div class="ri-err">${d.error||d.status}</div>` : '';
    return `<div class="result-item">
      <div class="ri-name">${d.productName||d.query}${badge}</div>
      ${d.c1 ? `<div class="ri-comp" style="color:#018d4c">1차: ${d.c1}</div>` : ''}
      ${failReason}
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!bulkResults.length) return;
  const headers = ['검색어','nvmid','상품명','태그','속성','완성상품명1차(속성)','완성상품명2차(태그)','완성상품명3차(속성+태그)','실패사유'];
  const rows = bulkResults.map(d => {
    const attrs = Object.entries(d.attributes||{}).map(([k,v])=>`${k}: ${v}`).join(' / ');
    const fail = d.status === 'nvmidMismatch' ? 'nvmid 불일치'
      : d.status === 'noAttributes' ? '속성없는상품(nvmid일치)'
      : d.status === 'notFound' ? '미발견'
      : d.status === 'error' ? (d.error||'오류') : '';
    return [d.query||'', d.nvmid||'', d.productName||'', (d.tags||[]).join(' '), attrs, d.c1||'', d.c2||'', d.c3||'', fail];
  });
  const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `태그추출_${new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g,'-').slice(0,-1)}.csv`;
  a.click();
}

document.getElementById('queryInput').addEventListener('keydown', e => { if(e.key==='Enter') searchSingle(); });
</script>
