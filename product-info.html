<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 태그·속성 추출기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Pretendard', sans-serif; background: #f7f8fa; min-height: 100vh; padding: 2rem 1rem; color: #111; }
.container { max-width: 660px; margin: 0 auto; }
.header { margin-bottom: 2rem; }
.header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }

.input-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
.input-wrap input {
  flex: 1; padding: 11px 14px; border: 1.5px solid #ddd;
  border-radius: 10px; font-size: 14px; outline: none; background: #fff;
  transition: border-color 0.15s;
}
.input-wrap input:focus { border-color: #03c75a; }
.input-wrap button {
  padding: 11px 22px; background: #03c75a; color: #fff;
  border: none; border-radius: 10px; font-size: 14px;
  font-weight: 700; cursor: pointer; white-space: nowrap;
}
.input-wrap button:hover { background: #02a84a; }
.input-wrap button:disabled { background: #bbb; cursor: not-allowed; }
.hint { font-size: 12px; color: #aaa; margin-bottom: 1.5rem; }

.card { background: #fff; border-radius: 14px; border: 1px solid #ebebeb; padding: 1.25rem; margin-bottom: 12px; }
.card-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.prod-name { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1.4; }
.prod-meta { font-size: 13px; color: #888; margin-top: 4px; }
.price { color: #e5222a; font-weight: 700; }
.matched-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0faf5; color: #018d4c; border: 1px solid #c5e8d5; margin-top: 8px; }
.no-match-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #fff8f0; color: #c67c00; border: 1px solid #ffd899; margin-top: 8px; }

.attr-table { width: 100%; border-collapse: collapse; }
.attr-table tr { border-bottom: 1px solid #f2f2f2; }
.attr-table tr:last-child { border-bottom: none; }
.attr-table td { padding: 7px 0; font-size: 13px; vertical-align: top; }
.attr-table td:first-child { color: #999; width: 110px; }
.attr-table td:last-child { font-weight: 600; color: #111; }

.cat-path { font-size: 13px; color: #555; }
.cat-path .sep { color: #ccc; margin: 0 5px; }
.cat-path .last { font-weight: 700; color: #111; }

.tag-notice { font-size: 13px; color: #888; line-height: 1.6; }
.tag-notice a { color: #03c75a; text-decoration: none; font-weight: 600; }
.tag-notice a:hover { text-decoration: underline; }

.copy-btn { margin-left: auto; font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 1px solid #ddd; background: #f8f8f8; color: #666; cursor: pointer; }
.copy-btn:hover { background: #eee; }

.error-box { background: #fff5f5; border: 1px solid #fcc; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #c0392b; margin-bottom: 12px; }
.loading { text-align: center; padding: 2rem; font-size: 13px; color: #aaa; }
.loading span { animation: pulse 1.2s ease-in-out infinite; display: inline-block; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.empty { font-size: 13px; color: #bbb; }

.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; float: right; margin-left: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>상품 태그·속성 추출기</h1>
    <p>네이버 쇼핑 상품명을 정확하게 입력하세요</p>
  </div>

  <div class="input-wrap">
    <input type="text" id="queryInput" placeholder="예: 오즈네일 고발색 고광택 샤인무드 네일 매니큐어" />
    <button id="btn" onclick="search()">검색</button>
  </div>
  <div class="hint">* 상품명이 정확할수록 일치율이 높아요</div>

  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div id="loading" class="loading" style="display:none;"><span>검색 중...</span></div>
  <div id="results"></div>
</div>

<script>
const API_BASE = 'https://storemaster-sigma.vercel.app';

async function search() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '검색 중...';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').innerHTML = '';

  try {
    const res = await fetch(`${API_BASE}/api/product-info?query=${encodeURIComponent(query)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data, query);
  } catch (e) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = '오류: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '검색';
    document.getElementById('loading').style.display = 'none';
  }
}

function normalize(str) {
  return str.replace(/\s+/g, ' ').toLowerCase().trim();
}

function render(d, query) {
  const r = document.getElementById('results');
  let html = '';

  const isExact = normalize(d.matchedTitle) === normalize(query);

  // 기본정보
  html += `<div class="card">`;
  if (d.image) html += `<img class="thumb" src="${d.image}" alt="상품이미지">`;
  html += `<div class="prod-name">${d.productName}</div>`;
  const metas = [];
  if (d.mall) metas.push(d.mall);
  if (d.price) metas.push(`<span class="price">${d.price}</span>`);
  if (metas.length) html += `<div class="prod-meta">${metas.join(' · ')}</div>`;
  html += isExact
    ? `<div class="matched-badge">✓ 상품명 일치</div>`
    : `<div class="no-match-badge">⚠ 유사 상품 — 직접 확인 필요</div>`;
  if (d.link) html += `<div style="margin-top:8px;"><a href="${d.link}" target="_blank" style="font-size:12px;color:#03c75a;">네이버 쇼핑에서 보기 →</a></div>`;
  html += `</div>`;

  // 카테고리
  if (d.category && d.category.length > 0) {
    html += `<div class="card">
      <div class="card-label">카테고리</div>
      <div class="cat-path">${d.category.map((c, i) =>
        i === d.category.length - 1
          ? `<span class="last">${c}</span>`
          : `${c}<span class="sep">›</span>`
      ).join('')}</div>
    </div>`;
  }

  // 브랜드/제조사
  const attrs = [];
  if (d.brand) attrs.push(['브랜드', d.brand]);
  if (d.maker) attrs.push(['제조사', d.maker]);
  if (attrs.length) {
    html += `<div class="card">
      <div class="card-label">브랜드 · 제조사</div>
      <table class="attr-table">
        ${attrs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  // 태그 안내
  html += `<div class="card">
    <div class="card-label">태그 · 속성</div>
    <div class="tag-notice">
      네이버 검색 API에는 태그·속성 정보가 포함되지 않습니다.<br>
      ${d.link ? `<a href="${d.link}" target="_blank">네이버 쇼핑 상품 페이지</a>에서 직접 확인해 주세요.` : '네이버 쇼핑에서 직접 확인해 주세요.'}
    </div>
  </div>`;

  r.innerHTML = html;
}

document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
